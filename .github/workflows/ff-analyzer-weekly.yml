name: FF Analyzer Weekly

on:
  schedule:
    - cron: '0 14 * * 1'   # Every Monday at 14:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  analyze-reviews:
    name: Run FF review-performance analyzer
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main (full history)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run analyzer
        run: |
          python3 docs/workflow/operations/codex-skills/feature-factory/scripts/run_factory.py \
            analyze-reviews \
            --out "docs/workflow/analysis/review-performance-$(date -u +%Y-%m-%d).md"

      - name: Commit snapshot if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage only the analysis output directory
          git add docs/workflow/analysis/

          # Nothing to do if the file is identical to what's already on main
          if git diff --cached --quiet; then
            echo "No new data since last run - skipping commit."
            exit 0
          fi

          DATE=$(date -u +%Y-%m-%d)
          SUBJECT="chore(ff-analyzer): weekly review-performance snapshot ${DATE}"
          BODY="Auto-generated by .github/workflows/ff-analyzer-weekly.yml.\nSource data: state.json files under docs/workflow/feature-runs/."
          git commit -m "${SUBJECT}" -m "$(printf '%b' "${BODY}")"

          git push
