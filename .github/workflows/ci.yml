name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'cloud/apps/api/**'
              - 'cloud/packages/db/**'
              - 'cloud/packages/shared/**'
              - 'cloud/workers/**'
              - 'cloud/package.json'
              - 'cloud/package-lock.json'
              - 'cloud/turbo.json'
              - 'cloud/tsconfig*.json'
              - '.github/workflows/**'
            web:
              - 'cloud/apps/web/**'
              - 'cloud/packages/shared/**'
              - 'cloud/package.json'
              - 'cloud/package-lock.json'
              - 'cloud/turbo.json'
              - 'cloud/tsconfig*.json'
              - '.github/workflows/**'

  lint-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    env:
      JWT_SECRET: test-secret-that-is-at-least-32-characters-long
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check file sizes (tiered thresholds)
        run: ./cloud/scripts/check-file-sizes.sh --base origin/${{ github.base_ref || 'main' }}

      - name: Check filenames (banned placeholder suffixes)
        run: ./cloud/scripts/check-filenames.sh --base origin/${{ github.base_ref || 'main' }}

      - name: Check barrels (trivial re-export index.ts)
        run: ./cloud/scripts/check-barrels.sh --base origin/${{ github.base_ref || 'main' }}

      - name: Tech-debt reminders (informational)
        run: ./cloud/scripts/check-tech-debt.sh --changed
        continue-on-error: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        id: node-cache
        uses: actions/cache@v4
        with:
          path: cloud/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('cloud/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install Node dependencies
        if: steps.node-cache.outputs.cache-hit != 'true'
        working-directory: cloud
        run: npm ci

      - name: Lint and build
        working-directory: cloud
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
        run: npx turbo lint build

  feature-factory-tests:
    name: Feature Factory Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Capture workflow isolation baseline
        run: python3 docs/workflow/operations/codex-skills/feature-factory/scripts/check_workflow_isolation.py --capture-baseline /tmp/ff-baseline.json

      - name: Run feature-factory tests
        run: python3 -m unittest discover docs/workflow/operations/codex-skills/feature-factory/scripts/tests

      - name: Verify workflow isolation
        if: always()
        run: python3 docs/workflow/operations/codex-skills/feature-factory/scripts/check_workflow_isolation.py --check --baseline /tmp/ff-baseline.json

  web-tests:
    name: Web Tests (${{ matrix.shard }}/${{ matrix.total }})
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      matrix:
        shard: [1, 2, 3]
        total: [3]

    env:
      JWT_SECRET: test-secret-that-is-at-least-32-characters-long
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        id: node-cache
        uses: actions/cache@v4
        with:
          path: cloud/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('cloud/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install Node dependencies
        if: steps.node-cache.outputs.cache-hit != 'true'
        working-directory: cloud
        run: npm ci

      - name: Build shared packages
        working-directory: cloud
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
        run: npx turbo build --filter=@valuerank/shared

      - name: Run web tests (shard ${{ matrix.shard }}/${{ matrix.total }})
        working-directory: cloud/apps/web
        run: npx vitest run --shard=${{ matrix.shard }}/${{ matrix.total }}

  web-tests-skip:
    # Skeleton job that reports "pass" under the same name as web-tests when
    # no web-relevant paths changed, so branch protection's required checks
    # are satisfied without running real tests.
    name: Web Tests (${{ matrix.shard }}/${{ matrix.total }})
    needs: changes
    if: needs.changes.outputs.web == 'false'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        shard: [1, 2, 3]
        total: [3]
    steps:
      - run: echo "No web-relevant changes detected; skipping shard ${{ matrix.shard }}/${{ matrix.total }}."

  api-tests:
    name: API & DB Tests
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: valuerank
          POSTGRES_PASSWORD: valuerank
          POSTGRES_DB: valuerank_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://valuerank:valuerank@localhost:5433/valuerank_test
      DIRECT_URL: postgresql://valuerank:valuerank@localhost:5433/valuerank_test
      JWT_SECRET: test-secret-that-is-at-least-32-characters-long
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        id: node-cache
        uses: actions/cache@v4
        with:
          path: cloud/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('cloud/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install Node dependencies
        if: steps.node-cache.outputs.cache-hit != 'true'
        working-directory: cloud
        run: npm ci

      - name: Build dependencies
        working-directory: cloud
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
        run: npx turbo build

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('cloud/workers/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python worker dependencies
        working-directory: cloud/workers
        run: python -m pip install -r requirements.txt

      - name: Setup test database schema
        working-directory: cloud
        run: npm run db:test:setup

      - name: Run API and DB tests
        working-directory: cloud
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
        run: npx turbo test --filter=@valuerank/api --filter=@valuerank/db

  api-tests-skip:
    # Skeleton job that reports "pass" under the same name as api-tests when
    # no api-relevant paths changed, so branch protection's required checks
    # are satisfied without running real tests.
    name: API & DB Tests
    needs: changes
    if: needs.changes.outputs.api == 'false'
    runs-on: ubuntu-latest
    steps:
      - run: echo "No API-relevant changes detected; skipping."
