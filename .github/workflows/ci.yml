name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-build-web:
    name: Lint, Build & Web Tests
    runs-on: ubuntu-latest

    env:
      JWT_SECRET: test-secret-that-is-at-least-32-characters-long
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cloud/package-lock.json

      - name: Install Node dependencies
        working-directory: cloud
        run: npm ci

      - name: Lint and build
        working-directory: cloud
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
        run: npx turbo lint build

      - name: Run web and shared tests
        working-directory: cloud
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
        run: npx turbo test --filter=@valuerank/web --filter=@valuerank/shared

  api-tests:
    name: API & DB Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: valuerank
          POSTGRES_PASSWORD: valuerank
          POSTGRES_DB: valuerank_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://valuerank:valuerank@localhost:5433/valuerank_test
      DIRECT_URL: postgresql://valuerank:valuerank@localhost:5433/valuerank_test
      JWT_SECRET: test-secret-that-is-at-least-32-characters-long
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cloud/package-lock.json

      - name: Install Node dependencies
        working-directory: cloud
        run: npm ci

      - name: Build dependencies
        working-directory: cloud
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
        run: npx turbo build

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('cloud/workers/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python worker dependencies
        working-directory: cloud/workers
        run: python -m pip install -r requirements.txt

      - name: Setup test database schema
        working-directory: cloud
        run: npm run db:test:setup

      - name: Run API and DB tests
        working-directory: cloud
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
        run: npx turbo test --filter=@valuerank/api --filter=@valuerank/db
