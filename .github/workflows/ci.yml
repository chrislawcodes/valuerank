name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    env:
      JWT_SECRET: test-secret-that-is-at-least-32-characters-long
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        id: node-cache
        uses: actions/cache@v4
        with:
          path: cloud/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('cloud/package-lock.json') }}

      - name: Install Node dependencies
        if: steps.node-cache.outputs.cache-hit != 'true'
        working-directory: cloud
        run: npm ci

      - name: Lint and build
        working-directory: cloud
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
        run: npx turbo lint build

  web-tests:
    name: Web Tests (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: lint-build
    timeout-minutes: 15

    strategy:
      matrix:
        include:
          - name: analysis-a-d
            filter: tests/components/analysis/Analysis tests/components/analysis/Condition tests/components/analysis/Contested tests/components/analysis/Decision
          - name: analysis-m-z
            filter: tests/components/analysis/Method tests/components/analysis/Model tests/components/analysis/Overview tests/components/analysis/Paired tests/components/analysis/Pivot tests/components/analysis/Scenario tests/components/analysis/Score tests/components/analysis/Variable
          - name: compare
            filter: tests/components/analysis-v2 tests/components/compare
          - name: components-data
            filter: tests/components/runs tests/components/definitions tests/components/domains
          - name: components-ui
            filter: tests/components/layout tests/components/settings tests/components/ui tests/components/assumptions tests/components/import tests/components/export tests/components/ModelGroupsSection tests/components/DominanceSection tests/components/SimilaritySection tests/components/ProtectedRoute tests/components/ValuePrioritiesSection
          - name: units
            filter: tests/pages tests/hooks tests/lib tests/api tests/auth tests/utils tests/App

    env:
      JWT_SECRET: test-secret-that-is-at-least-32-characters-long
      NODE_ENV: test
      NODE_OPTIONS: --max-old-space-size=4096

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        id: node-cache
        uses: actions/cache@v4
        with:
          path: cloud/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('cloud/package-lock.json') }}

      - name: Install Node dependencies
        if: steps.node-cache.outputs.cache-hit != 'true'
        working-directory: cloud
        run: npm ci

      - name: Build shared packages
        working-directory: cloud
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
        run: npx turbo build --filter=@valuerank/shared

      - name: Run web tests (${{ matrix.name }})
        working-directory: cloud/apps/web
        run: |
          set -e
          for dir in ${{ matrix.filter }}; do
            echo "--- Running $dir ---"
            npx vitest run "$dir"
          done

  api-tests:
    name: API & DB Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: valuerank
          POSTGRES_PASSWORD: valuerank
          POSTGRES_DB: valuerank_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://valuerank:valuerank@localhost:5433/valuerank_test
      DIRECT_URL: postgresql://valuerank:valuerank@localhost:5433/valuerank_test
      JWT_SECRET: test-secret-that-is-at-least-32-characters-long
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        id: node-cache
        uses: actions/cache@v4
        with:
          path: cloud/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('cloud/package-lock.json') }}

      - name: Install Node dependencies
        if: steps.node-cache.outputs.cache-hit != 'true'
        working-directory: cloud
        run: npm ci

      - name: Build dependencies
        working-directory: cloud
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
        run: npx turbo build

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('cloud/workers/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python worker dependencies
        working-directory: cloud/workers
        run: python -m pip install -r requirements.txt

      - name: Setup test database schema
        working-directory: cloud
        run: npm run db:test:setup

      - name: Run API and DB tests
        working-directory: cloud
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
        run: npx turbo test --filter=@valuerank/api --filter=@valuerank/db
