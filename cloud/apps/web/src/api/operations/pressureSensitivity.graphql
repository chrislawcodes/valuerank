query PressureSensitivity(
  $domainId: ID
  $providerId: ID
  $signature: String!
) {
  pressureSensitivity(
    domainId: $domainId
    providerId: $providerId
    signature: $signature
  ) {
    models {
      modelId
      label
      providerName
      unscoredCount
      pressureResponseSummary {
        mean
        rangeMin
        rangeMax
        pairsMeasured
      }
      valuePairs {
        pairKey
        firstValueToken
        firstValueLabel
        secondValueToken
        secondValueLabel
        n
        unscoredCount
        definitionsMeasured
        pressureResponse {
          value
          baselineRate
          pushTowardFirstRate
          pushTowardSecondRate
          qualifyingTrials
          ciLow
          ciHigh
          reason
        }
        grid {
          ownLevel
          opponentLevel
          n
          unscoredCount
          winRate
          conviction
          netScore
          lowData
        }
      }
    }
    insufficient {
      modelId
      label
      providerName
      reason
    }
    excludedDefinitions {
      definitionId
      name
      reason
    }
    pressureConditionExcludedCount
    pressureConditionExclusionBreakdown {
      sourceRunMapping
      definitionMetadata
      missingScenario
      invalidMetadata
      levelAssignment
    }
    transcriptCapHit
    directionalSanityCheck {
      positivePct
      flatPct
      negativePct
      measuredCount
      unmeasurableCount
      breakdown {
        modelId
        pairKey
        pressureResponse
        classification
      }
    }
  }
}
