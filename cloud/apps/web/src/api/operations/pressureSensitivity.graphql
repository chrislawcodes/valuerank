query PressureSensitivity(
  $domainId: ID
  $providerId: ID
  $signature: String!
) {
  pressureSensitivity(
    domainId: $domainId
    providerId: $providerId
    signature: $signature
  ) {
    models {
      modelId
      label
      providerName
      unscoredCount
      winRateDeltaSummary {
        mean
        ciLow
        ciHigh
        lowBandMean
        highBandMean
        pairsMeasured
        pairsPositive
      }
      valuePairs {
        pairKey
        ownToken
        opponentToken
        n
        unscoredCount
        definitionsMeasured
        definitionsExcluded
        qualifyingTrials
        winRateDelta {
          value
          lowBandMean
          highBandMean
          ciLow
          ciHigh
          reason
        }
        grid {
          ownLevel
          opponentLevel
          n
          unscoredCount
          winRate
          conviction
          netScore
          lowData
        }
      }
    }
    insufficient {
      modelId
      label
      providerName
      reason
    }
    excludedDefinitions {
      definitionId
      name
      reason
    }
    excludedScenariosCount
    transcriptCapHit
    directionalSanityCheck {
      positivePct
      flatPct
      negativePct
      measuredCount
      unmeasurableCount
      breakdown {
        modelId
        pairKey
        winRateDelta
        classification
      }
    }
  }
}
