query ConfidenceTranscripts($modelId: String!, $valueKey: String!, $signature: String, $limit: Int) {
  confidenceTranscripts(modelId: $modelId, valueKey: $valueKey, signature: $signature, limit: $limit) {
    id
    runId
    scenarioId
    modelId
    decisionModelV2
    turnCount
    tokenCount
    durationMs
    createdAt
    content
  }
}
