query ModelsWinRateStability($signature: String, $domainId: ID, $domainIds: [ID!]) {
  modelsWinRateStability(signature: $signature, domainId: $domainId, domainIds: $domainIds) {
    models {
      modelId
      label
      qualifyingVignetteCount
      avgDirectionalAgreement
      stableShare
      softLeanShare
      tornShare
      unstableShare
    }
    skippedVignettes {
      definitionId
      vignetteName
      reason
    }
  }
}
