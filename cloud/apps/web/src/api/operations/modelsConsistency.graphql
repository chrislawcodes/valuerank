query ModelsConsistency(
  $domainId: ID
  $providerId: ID
  $minScenarios: Int
  $signature: String!
) {
  modelsConsistency(
    domainId: $domainId
    providerId: $providerId
    minScenarios: $minScenarios
    signature: $signature
  ) {
    models {
      modelId
      label
      providerName
      repeatability {
        value
        ciLow
        ciHigh
        withinScenarioSd
        betweenScenarioSd
        scenariosMeasured
        perDomain {
          domainId
          domainName
          value
          ciLow
          ciHigh
          scenariosMeasured
        }
        perScenario {
          scenarioId
          matches
          trials
          p
          ciLow
          ciHigh
        }
      }
      coherence {
        value
        coherentPairs
        determinatePairs
        indeterminatePairs
        perPair {
          domainId
          valueKey
          rho
          pValue
          coherent
          determinate
          targetAnalysisRunId
          targetCompanionRunId
          primaryConditionIds
          companionConditionIds
          perCondition {
            scenarioId
            netPressureRank
            winRate
            matches
            trials
          }
        }
      }
      orderEffect {
        samePct
        flippedPct
        noisyPct
        notApplicable
      }
    }
    insufficient {
      modelId
      label
      providerName
      reason
    }
  }
}
