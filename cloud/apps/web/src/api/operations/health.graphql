query SystemHealth($refresh: Boolean) {
  systemHealth(refresh: $refresh) {
    providers {
      providers {
        id
        name
        configured
        connected
        error
        remainingBudgetUsd
        lastChecked
      }
      checkedAt
    }
    queue {
      isHealthy
      isRunning
      isPaused
      activeJobs
      pendingJobs
      completedLast24h
      failedLast24h
      successRate
      jobTypes {
        type
        pending
        active
        completed
        failed
      }
      error
      checkedAt
    }
    worker {
      isHealthy
      pythonVersion
      packages
      apiKeys
      warnings
      error
      checkedAt
    }
  }
}
