query AssumptionsOrderInvarianceLegacy($directionOnly: Boolean, $trimOutliers: Boolean) {
  assumptionsOrderInvariance(directionOnly: $directionOnly, trimOutliers: $trimOutliers) {
    generatedAt
    summary {
      status
      matchRate
      exactMatchRate
      totalCandidatePairs
      qualifyingPairs
      missingPairs
      comparablePairs
      sensitiveModelCount
      sensitiveVignetteCount
      presentationEffectMAD
      scaleEffectMAD
      excludedPairs {
        reason
        count
      }
    }
    rows {
      modelId
      modelLabel
      vignetteId
      vignetteTitle
      conditionKey
      majorityVoteBaseline
      majorityVoteFlipped
      mismatchType
      ordinalDistance
      isMatch
      variantType
    }
  }
}

query AssumptionsOrderInvarianceAnalysis($directionOnly: Boolean, $trimOutliers: Boolean) {
  assumptionsOrderInvariance(directionOnly: $directionOnly, trimOutliers: $trimOutliers) {
    generatedAt
    modelMetrics {
      modelId
      modelLabel
      matchRate
      matchCount
      matchEligibleCount
      valueOrderReversalRate
      valueOrderEligibleCount
      valueOrderExcludedCount
      valueOrderPull
      scaleOrderReversalRate
      scaleOrderEligibleCount
      scaleOrderExcludedCount
      scaleOrderPull
      withinCellDisagreementRate
      pairLevelMarginSummary {
        mean
        median
        p25
        p75
      }
    }
    rows {
      modelId
      modelLabel
      vignetteId
      vignetteTitle
      conditionKey
      majorityVoteBaseline
      majorityVoteFlipped
      ordinalDistance
      isMatch
      variantType
    }
  }
}

query AssumptionsOrderInvarianceReview {
  assumptionsOrderInvarianceReview {
    generatedAt
    summary {
      totalVignettes
      reviewedVignettes
      approvedVignettes
      rejectedVignettes
      pendingVignettes
      launchReady
    }
    vignettes {
      pairId
      vignetteId
      vignetteTitle
      conditionKey
      conditionPairCount
      sourceScenarioId
      variantScenarioId
      baselineName
      flippedName
      baselineText
      flippedText
      variantType
      reviewStatus
      reviewedBy
      reviewedAt
      reviewNotes
    }
  }
}

query AssumptionsOrderInvarianceTranscripts(
  $vignetteId: ID!
  $modelId: String!
  $conditionKey: String!
) {
  assumptionsOrderInvarianceTranscripts(
    vignetteId: $vignetteId
    modelId: $modelId
    conditionKey: $conditionKey
  ) {
    generatedAt
    vignetteId
    vignetteTitle
    modelId
    modelLabel
    conditionKey
    attributeALabel
    attributeBLabel
    transcripts {
      id
      runId
      scenarioId
      modelId
      modelVersion
      content
      turnCount
      tokenCount
      durationMs
      estimatedCost
      createdAt
      lastAccessedAt
      orderLabel
      attributeALevel
      attributeBLevel
    }
  }
}

query AssumptionsOrderInvarianceLaunchStatus($runIds: [ID!]!) {
  assumptionsOrderInvarianceLaunchStatus(runIds: $runIds) {
    generatedAt
    totalRuns
    activeRuns
    completedRuns
    failedRuns
    targetedTrials
    completedTrials
    failedTrials
    percentComplete
    isComplete
    stalledModels
    failureSummaries
    runs {
      runId
      status
      targetedTrials
      completedTrials
      failedTrials
      percentComplete
      startedAt
      completedAt
      isStalled
    }
  }
}

mutation ReviewOrderInvariancePair(
  $pairId: ID!
  $reviewStatus: String!
  $reviewNotes: String
) {
  reviewOrderInvariancePair(
    pairId: $pairId
    reviewStatus: $reviewStatus
    reviewNotes: $reviewNotes
  ) {
    pairId
    reviewStatus
    reviewedAt
  }
}

mutation LaunchOrderInvariance($force: Boolean) {
  launchOrderInvariance(force: $force) {
    startedRuns
    runsByVariantType
    approvedPairs
    modelCount
    runIds
    failedDefinitionIds
  }
}
