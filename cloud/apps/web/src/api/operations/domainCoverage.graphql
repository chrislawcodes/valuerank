query DomainValueCoverage($domainId: ID!, $modelIds: [String!], $signature: String) {
  domainValueCoverage(domainId: $domainId, modelIds: $modelIds, signature: $signature) {
    domainId
    values
    cells {
      valueA
      valueB
      batchEquivalent
      aFirstBatchEquivalent
      bFirstBatchEquivalent
      aFirstDefinitionName
      bFirstDefinitionName
      weakestCondition {
        conditionLabel
        modelCounts {
          modelId
          label
          trialCount
        }
        otherConditionsCount
      }
      contributingDefinitionIds
      definitionId
      aggregateRunId
    }
    availableModels {
      modelId
      label
    }
  }
}

