query DomainValueCoverage($domainId: ID!, $modelIds: [String!], $signature: String) {
  domainValueCoverage(domainId: $domainId, modelIds: $modelIds, signature: $signature) {
    domainId
    values
    cells {
      valueA
      valueB
      batchCount
      pairedBatchCount
      orphanedBatchCount
      aFirstBatchCount
      bFirstBatchCount
      pairedConditionCount
      orphanedConditionCount
      directionalCoverage {
        direction
        completeBatches
        filledSlots
        leftoverConditions
        definitionIds
      }
      contributingDefinitionIds
      incompleteBatchCount
      definitionId
      definitionName
      aggregateRunId
      minTrialCount
      maxTrialCount
      modelBreakdown {
        modelId
        label
        trialCount
      }
    }
    availableModels {
      modelId
      label
    }
  }
}

