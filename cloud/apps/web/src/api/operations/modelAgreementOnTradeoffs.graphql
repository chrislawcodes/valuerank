query ModelAgreementOnTradeoffs(
  $modelIds: [ID!]!
  $domainId: ID
  $scope: String!
  $signature: String!
) {
  modelAgreementOnTradeoffs(
    modelIds: $modelIds
    domainId: $domainId
    scope: $scope
    signature: $signature
  ) {
    pending
    buildProgress {
      completedRuns
      totalRuns
      currentRunId
      updatedAt
    }
    excludedNonBinaryCells
    tiedCells
    models {
      modelId
      label
    }
    unavailableModels {
      modelId
      label
      reason
    }
    pairwiseAgreementMatrix {
      modelAId
      modelALabel
      modelBId
      modelBLabel
      totalCells
      percentAgreement
      cohensKappa
      kappaInterpretation
      meanAbsoluteDivergence
      kappaByDomain {
        domainId
        domainName
        kappa
        cellCount
      }
      kappaSpread
      domainCount
    }
    trialConsistency {
      modelId
      modelLabel
      cellsObserved
      meanTrialConsistency
      noisy
    }
  }
}

query ModelPairDivergenceBreakdown(
  $modelAId: ID!
  $modelBId: ID!
  $domainId: ID
  $scope: String!
  $signature: String!
) {
  modelPairDivergenceBreakdown(
    modelAId: $modelAId
    modelBId: $modelBId
    domainId: $domainId
    scope: $scope
    signature: $signature
  ) {
    pending
    buildProgress {
      completedRuns
      totalRuns
      currentRunId
      updatedAt
    }
    modelAId
    modelALabel
    modelBId
    modelBLabel
    perValuePair {
      valueA
      valueB
      cellsCompared
      meanAbsoluteDivergence
      modelAProportionA
      modelBProportionA
    }
  }
}
