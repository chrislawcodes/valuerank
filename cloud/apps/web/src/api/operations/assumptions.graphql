query AssumptionsTempZero($directionOnly: Boolean) {
  assumptionsTempZero(directionOnly: $directionOnly) {
    domainName
    note
    generatedAt
    preflight {
      title
      runsToLaunch
      totalBatchesToRun
      projectedPromptCount
      projectedComparisons
      estimatedInputTokens
      estimatedOutputTokens
      estimatedCostUsd
      selectedSignature
      models {
        modelId
        label
        adapterMode
      }
      vignettes {
        vignetteId
        title
        conditionCount
        rationale
        batchesToRun
      }
    }
    summary {
      title
      status
      matchRate
      differenceRate
      comparisons
      excludedComparisons
      batchesRun
      modelsTested
      vignettesTested
      worstModelId
      worstModelLabel
      worstModelMatchRate
    }
    rows {
      modelId
      modelLabel
      vignetteId
      vignetteTitle
      conditionKey
      batch1
      batch2
      batch3
      isMatch
      mismatchType
      decisions {
        label
        transcriptId
        decision
        content
      }
    }
  }
}

mutation LaunchAssumptionsTempZero($force: Boolean) {
  launchAssumptionsTempZero(force: $force) {
    startedRuns
    totalVignettes
    modelCount
    runIds
    failedVignetteIds
  }
}
