meta:
  version: "Cloud Platform V1"
  mission: "Map the behavioral profiles of AI systems"

# ---------------------------------------------------------
# 1. Mission & Vision
# ---------------------------------------------------------
Vision:
  Mission: "Map the behavioral profiles of AI systems."
  Concept: "Today's AI models are black boxes... We rarely get a systematic, comparable map of how they actually behave across different situations."
  Goal: "Determine the human values embedded in AI decision-making by running vignette-based stress tests."
  Approach: "Scientific endeavor: Reproducible, Transparent, Neutral (no value judgements)."

# ---------------------------------------------------------
# 2. Methodology
# ---------------------------------------------------------
Methodology:
  Framework: "Schwartz framework of human values (currently testing 10 core values due to cost/efficiency, though the platform supports all 19)."
  Goals:
    1: "Find out which values each AI prioritizes."
    2: "Predict which value an AI will prioritize in a scenario."

  Vignette_Structure:
    1: "Domain Setup: Context sentence with an equal-footing clause to remove confounders."
    2: "Two options (A and B) representing conflicting values mapped to concrete entities."
    3: "Statement describing how strongly the subject cares about the value (1-5 scale)."
    4: "5-point choice scale: Strongly Support A (5) ... Neutral (3) ... Strongly Support B (1)"
    5: "Generic titles/subjects to avoid naming bias"

  Experimental_Design:
    - "Vary each value on a scale of 1-5."
    - "Result: 25 combinations (Conditions) for each vignette."
    - "Temperature: All target models are run at Temperature 0 to ensure deterministic preference signals rather than stochastic noise."
    - "Metric 1: Overall Win Rate (computed across all 25 grid responses to capture robustness of preference across varying intensity levels)."
    - "Metric 2: Bradley-Terry Pairwise Ranking (derived from the full win-rate matrix with BT-implied uncertainty)."
    - "Sensitivity analysis: report Average Marginal Effect (AME) by Attribute Level to show how much a model’s chance of prioritizing an attribute changes as pressure increases."

  Data_Hierarchy:
    Overview: "Data is organized in four levels: trial → condition → vignette → domain."

    Trial:
      Definition: "One time a model is given the prompt for one condition and produces an answer (one transcript)."
      Note: "Phase 1 runs N=1 trial per condition. N=3 is used as a fallback when non-determinism is detected."

    Condition:
      Definition: "One specific combination of attribute levels (e.g. A at level 3, B at level 4). There are 25 conditions per vignette (5×5 grid)."
      Win_Rate: "Win rate = trials where A was picked / (picked + not picked + neutral). The orientationFlipped flag on each transcript normalizes the model's raw answer to canonical A vs B direction before counting, so trials from a flipped narrative presentation are handled correctly within a single vignette."

    Vignette:
      Definition: "The full setup for one value pairing. A vignette is authored for a specific attribute order (e.g. Universalism vs Benevolence). The mirrored ordering (Benevolence vs Universalism) is a separate vignette with its own ID, its own scenario text, and its own win rates."
      Mirrored_Vignettes: "Because the scenario text is written from a specific framing, 'Universalism vs Benevolence' and 'Benevolence vs Universalism' are two distinct vignettes that will naturally produce different win rates. Both are valid data and both contribute equally to the domain win rate. The system normalizes both to the same canonical pair direction (alphabetical) before analysis, so results are always expressed consistently regardless of which vignette the trial came from."
      Vignettes_Per_Domain: "10 values → C(10,2) = 45 value pairs. With both orderings authored, a domain can contain up to 90 vignettes. Each contributes one data point to the domain win rate."
      Win_Rate: "Average of all 25 condition win rates, weighted equally."

    Domain:
      Definition: "A life context (e.g. Jobs, Neighborhoods) containing the full set of vignettes for that context."
      Win_Rate: |
        "Four-level aggregation — each level contributes one vote regardless of how many items it contains:
          1. Condition → Vignette rate: average the 25 condition rates equally.
          2. Vignette → Direction rate: for a given canonical pair (e.g. Achievement vs Universalism), average
             all vignettes that share the same authored order (e.g. all Achievement-first vignettes). This
             ensures that running 3 Achievement-first copies of a vignette does not outweigh a single
             Universalism-first copy.
          3. Direction → Pair rate: average the two direction rates equally (Achievement-first and
             Universalism-first each count as one vote). If only one direction has been run, that direction
             rate is the pair rate.
          4. Pair → Domain rate: average all canonical pair rates equally. Each distinct value-pairing (e.g.
             Achievement vs Universalism) counts as one vote, regardless of how many vignettes or directions
             were sampled for that pairing."

      Direction_Balancing_Example: |
        "Why direction balancing matters — concrete example:

        Suppose we have 4 vignettes for the Security vs Privacy pair:
          V1 (Security-first): model picks Security 70% of the time
          V2 (Security-first): model picks Security 80% of the time
          V3 (Security-first): model picks Security 90% of the time
          V4 (Privacy-first):  model picks Security 40% of the time

        Flat average (wrong): (70 + 80 + 90 + 40) / 4 = 70%
        This overstates Security preference because we happened to author 3 Security-first vignettes.

        Direction-balanced (correct):
          Security-first direction rate: (70 + 80 + 90) / 3 = 80%
          Privacy-first direction rate: 40%
          Final pair rate: (80 + 40) / 2 = 60%

        The 60% is a more honest estimate of how often the model favors Security. It treats each
        authored direction as one vote regardless of how many vignettes were written in that direction.
        This same logic applies to all win rate columns in the pressure sensitivity analysis."

  Project_Procedure:
    Goal: "Deterministic Grid Sampling"
    - "Phase 1 (Estimation): Run the full 25-condition grid for each vignette exactly once per domain (N=1 per condition at Temp 0). Total: 1,125 trials per domain."
    - "Phase 2 (Validity Check): Verify manipulation works by ensuring corners (5,1) and (1,5) enforce intended directionality, and regression coefficients are properly signed."
    - "Phase 3 (Cross-domain Replication): Replicate across structurally distinct domains to test if value orderings hold, evaluating stable value profiles (e.g. via Kendall's τ)."

# ---------------------------------------------------------
# 3. Critical User Journeys
# ---------------------------------------------------------
User_Journeys:
  Flow: "Domain Expansion -> Vignette Creation -> Target AI Probing -> Analysis & Export"

  Initial_Setup:
    - "Preamble creation: Primes Target AIs to focus on moral reasoning via system prompts."
    - "Value Rubric: Selecting the values to test for the specific domain."

  Scenario_Creation:
    - "Author Vignettes securely in the React-based DevTool, defining dimensions (values) and extracting the full 5x5 baseline scenario grid."

  Execution_Engine:
    - "Orchestrate evaluation runs against target models (GPT-4o, Claude 3.5, Gemini 1.5, etc) via a highly-concurrent PostgreSQL/PgBoss job queue paired with Python execution workers (probe, summarize, analyze)."

  Evaluation_Phase:
    - "The Target AI is prompted to return a 1-5 rating directly."
    - "The summarize worker records canonical decision meaning as `direction + strength` and preserves legacy compatibility scalars for analysis. There is no separate Judge AI; the models answer the prompt directly."

  Analysis_Export:
    - "Review aggregate statistics (Win Rates, Pairwise Matrices) via the Web UI."
    - "Show AME in upgraded analysis tables when the goal is to compare how strongly different attributes respond to level changes."
    - "Export compact datasets (CSV) or OData for unified external analysis (e.g., in Google Sheets)."

# ---------------------------------------------------------
# 4. Terminology
# ---------------------------------------------------------
Definitions:
  Domain: "A life context (e.g., Jobs, Neighborhoods, City Planning) that provides a natural binary-choice frame."
  Vignette: "The complete experimental narrative and unit of testing."
  Attribute: "Specific Schwartz human values (e.g., Universalism, Security)."
  Level: "Degree of prominence/weight assigned to an Attribute (1-5)."
  Condition: "A specific realization of a Vignette where Attribute levels are fixed (a cell in a 5x5 grid)."
  Trial: "Act of presenting a single Condition to a Target AI."
  Batch: "Complete execution of an experiment across conditions."

# ---------------------------------------------------------
# 5. Design Decisions
# ---------------------------------------------------------
Design:
  Values_Model: "Schwartz 10 Values chosen for the initial rollout and first wave of domain expansions for cost-efficiency. The system fundamentally models the full 19 values."
  Sample_Size: "Fixed deterministic sampling: N=1 per condition per vignette for Phase 1 runs (fallback to N=3 if non-determinism detected at Temp 0)."

# ---------------------------------------------------------
# 6. Roadmap & Priorities
# ---------------------------------------------------------
Roadmap:
  - "Robustness & Meta-Evaluation (manipulation validity checks, transitivity checks, framing floor effects)"
  - "Vignette Domain Expansion (Scaling to structurally distinct domains like Neighborhoods and City Planning to calculate cross-domain replication stable value profiles)"
  - "Deterministic Execution Architecture (Implement Temperature 0, 25-cell pooled win rate analysis)"
  - "Baseline Leaderboards (Publish pairwise win rate matrices and Bradley-Terry score rankings across frontier models)"
